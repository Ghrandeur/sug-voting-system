<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUG Secure Voting</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 360px; background: var(--card); padding: 2rem; border-radius: 12px; border: 1px solid #333; text-align: center; }
        h2 { font-weight: 300; letter-spacing: 1px; margin-bottom: 2rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; background: #000; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: #000; font-weight: 700; border: none; cursor: pointer; text-transform: uppercase; border-radius: 4px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div id="step1">
            <h2>IDENTITY VERIFY</h2>
            <input type="text" id="m" placeholder="MATRIC NUMBER" style="text-transform: uppercase;">
            <button onclick="start()">Initiate</button>
        </div>

        <div id="step2" class="hidden">
            <h2>ENTER TOKEN</h2>
            <input type="text" id="t" placeholder="6-DIGIT PIN">
            <button onclick="verify()">Validate</button>
        </div>

        <div id="step3" class="hidden">
            <h2>CAST VOTE</h2>
            <button onclick="vote()">CONFIRM CANDIDATE A</button>
        </div>
    </div>

    <script>
        const API = "https://sug-voting-system.onrender.com";
        let matric = "";

        async function start() {
            matric = document.getElementById('m').value.toUpperCase();
            const r = await fetch(`${API}/api/send-token`, {method:'POST', body:JSON.stringify({matric}), headers:{'Content-Type':'application/json'}});
            if(r.ok) { document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }
            else { alert("Access Denied"); }
        }

        async function verify() {
            const token = document.getElementById('t').value;
            const r = await fetch(`${API}/api/verify-token`, {method:'POST', body:JSON.stringify({matric, token}), headers:{'Content-Type':'application/json'}});
            if(r.ok) { document.getElementById('step2').classList.add('hidden'); document.getElementById('step3').classList.remove('hidden'); }
            else { alert("Invalid Token"); }
        }

        async function vote() {
            await fetch(`${API}/api/cast-vote`, {method:'POST', body:JSON.stringify({matric}), headers:{'Content-Type':'application/json'}});
            alert("Vote Recorded Successfully.");
            window.location.reload();
        }
    </script>
</body>
</html>
