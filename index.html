<!DOCTYPE html>
<html>
<body>
    <div id="app">
        <div id="step1">
            <input id="m" placeholder="Matric Number">
            <button onclick="start()">Verify</button>
        </div>
        <div id="step2" style="display:none">
            <input id="t" placeholder="6-Digit PIN">
            <button onclick="verify()">Submit</button>
        </div>
        <div id="step3" style="display:none">
            <button onclick="vote()">Vote Candidate A</button>
        </div>
    </div>

    <script>
        const API = "https://sug-voting-system.onrender.com";
        let matric = "";

        async function start() {
            matric = document.getElementById('m').value;
            const r = await fetch(`${API}/api/send-token`, {method:'POST', body:JSON.stringify({matric}), headers:{'Content-Type':'application/json'}});
            if(r.ok) { document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; }
        }

        async function verify() {
            const token = document.getElementById('t').value;
            const r = await fetch(`${API}/api/verify-token`, {method:'POST', body:JSON.stringify({matric, token}), headers:{'Content-Type':'application/json'}});
            if(r.ok) { document.getElementById('step2').style.display='none'; document.getElementById('step3').style.display='block'; }
        }

        async function vote() {
            await fetch(`${API}/api/cast-vote`, {method:'POST', body:JSON.stringify({matric}), headers:{'Content-Type':'application/json'}});
            alert("Vote Successful!");
        }
    </script>
</body>
</html>
