<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUG Electoral Portal</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #0f0f0f; color: white; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Identity Roll Check</h2>
        <input type="text" id="matricInput" placeholder="Enter Matric Number" style="text-transform: uppercase;">
        <button onclick="verifyStudent()">VERIFY IDENTITY</button>
    </div>

    <script>
        // REPLACE THIS WITH YOUR LIVE RENDER URL (No trailing slash)
        const API_BASE = "https://sug-voting-system.onrender.com";

        async function verifyStudent() {
            const matric = document.getElementById('matricInput').value.trim().toUpperCase();
            
            if (!matric) {
                alert("Please enter a matric number.");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/send-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matric: matric })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Success: " + result.message + "\nCheck email: " + result.target);
                } else {
                    alert("Access Alert: " + result.message);
                }
            } catch (error) {
                alert("Connection Error: Check your internet or Render status.");
                console.error("Fetch error:", error);
            }
        }
    </script>
</body>
</html>
